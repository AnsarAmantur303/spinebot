; ── Standard ESP32 WROOM (no camera) ───────────────────────────────────────
; [env:upesy_wroom]
; platform = espressif32
; board     = upesy_wroom
; framework = arduino

; ── AI Thinker ESP32-CAM (use this for the SpineBot firmware) ───────────────
[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; partition scheme that gives enough flash for the camera OTA image
board_build.partitions = huge_app.csv

lib_deps =
    bblanchon/ArduinoJson        @ ^7.0.0
    madhephaestus/ESP32Servo     @ ^3.0.5
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit SH110X      @ ^2.1.0

monitor_speed = 115200
